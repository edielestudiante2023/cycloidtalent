<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión | Cycloid Talent</title>
    <meta name="theme-color" content="#0345BF">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F8FAFC;
            color: #1E293B;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: #fff;
            border-radius: 1rem;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            border: 1px solid #e2e8f0;
        }
        .logo { width: 80px; height: 80px; margin: 0 auto 1.5rem; }
        .icon-offline {
            width: 56px; height: 56px;
            margin: 0 auto 1rem;
            color: #0345BF;
        }
        h1 { font-size: 1.375rem; font-weight: 700; color: #0A1628; margin-bottom: .5rem; }
        p { font-size: .9rem; color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            background: #0345BF;
            color: #fff;
            font-size: .9rem;
            font-weight: 600;
            padding: .75rem 2rem;
            border-radius: .75rem;
            border: none;
            cursor: pointer;
            transition: background .2s;
            text-decoration: none;
        }
        .btn:hover { background: #0235a0; }
        .footer-text { font-size: .75rem; color: #94a3b8; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <img src="assets/img/logos/cycloid-logo-azul.png" alt="Cycloid Talent" class="logo"
             onerror="this.style.display='none'">
        <svg class="icon-offline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M12 9v4m0 4h.01M3 3l18 18"/>
        </svg>
        <h1>Sin conexión a internet</h1>
        <p>No pudimos cargar esta página. Verifica tu conexión e inténtalo de nuevo.</p>
        <button class="btn" onclick="window.location.reload()">Reintentar</button>
        <p class="footer-text">Cycloid Talent SAS</p>
    </div>
</body>
</html>
