name: Validar y Deploy a Dev/QA

on:
  push:
    branches: [develop, 'feature/*']
  pull_request:
    branches: [develop]

jobs:
  test:
    name: Verificacion de sintaxis PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar sintaxis PHP
        run: |
          echo "=== Verificando sintaxis PHP ==="
          find app/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -v "No syntax errors" || true
          find app/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -q "Parse error" && exit 1 || echo "OK — Sin errores de sintaxis"

  trivy:
    name: Escaneo de vulnerabilidades (Trivy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Escanear dependencias
        run: |
          trivy fs --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed .

  semgrep:
    name: Analisis estatico de seguridad (Semgrep)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Instalar y ejecutar Semgrep
        run: |
          pip install semgrep
          semgrep scan --config p/php --config p/secrets --config p/security-audit --error app/

  secrets-scan:
    name: Busqueda de credenciales hardcodeadas
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Buscar API Keys hardcodeadas
        run: |
          echo "=== Buscando credenciales hardcodeadas ==="
          FOUND=0
          # SendGrid
          grep -rn "SG\.[a-zA-Z0-9_-]\{20,\}" app/ && FOUND=1 || true
          # Passwords de BD
          grep -rn "AVNS_[a-zA-Z0-9_-]\{10,\}" app/ && FOUND=1 || true
          # OpenAI
          grep -rn "sk-[a-zA-Z0-9]\{20,\}" app/ && FOUND=1 || true
          # Anthropic
          grep -rn "sk-ant-[a-zA-Z0-9]\{20,\}" app/ && FOUND=1 || true
          # Generic long tokens
          grep -rn "Bearer [a-zA-Z0-9_-]\{40,\}" app/ && FOUND=1 || true
          if [ "$FOUND" -eq 1 ]; then
            echo "FALLO: Se encontraron credenciales hardcodeadas"
            exit 1
          fi
          echo "OK — No se encontraron credenciales hardcodeadas"

  deploy-qa:
    name: Deploy a Dev/QA
    runs-on: ubuntu-latest
    needs: [trivy, semgrep, secrets-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd ${{ secrets.QA_PATH }}
            git pull origin develop
            echo "Deploy QA completado"
